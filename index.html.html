<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Okereke Capital, LLC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com/">
  <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin="">
  <link href="./index.html_files/css2" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #060e0d; overflow: hidden; }
    .wrap { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #060e0d; overflow: hidden; }
    #c { display: block; width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
    .dots-wrap {
      position: absolute;
      bottom: 24px;
      right: 28px;
      display: flex;
      gap: 9px;
      z-index: 10;
      pointer-events: none;
    }
    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #8ecac6;
      opacity: 0.15;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <canvas id="c" width="1910" height="1035" style="width: 1528px; height: 828px;"></canvas>
    <div class="dots-wrap">
      <div class="dot" id="d0" style="opacity: 0.15; box-shadow: none;"></div>
      <div class="dot" id="d1" style="opacity: 0.15; box-shadow: none;"></div>
      <div class="dot" id="d2" style="opacity: 1; box-shadow: rgba(142, 202, 198, 0.6) 0px 0px 6px 2px;"></div>
      <div class="dot" id="d3" style="opacity: 0.15; box-shadow: none;"></div>
    </div>
  </div>

  <script src="./index.html_files/three.min.js.download"></script>
  <script>
    // ---- Dot animation ----
    const dots = [0,1,2,3].map(i => document.getElementById('d'+i));
    let activeDot = 0, dotTimer = 0;
    function stepDots(ts) {
      if (ts - dotTimer > 380) {
        dots.forEach((d, i) => {
          d.style.opacity   = i === activeDot ? '1' : '0.15';
          d.style.boxShadow = i === activeDot ? '0 0 6px 2px rgba(142,202,198,0.6)' : 'none';
        });
        activeDot = (activeDot + 1) % 4;
        dotTimer = ts;
      }
      requestAnimationFrame(stepDots);
    }
    requestAnimationFrame(stepDots);

    // ---- Three.js vortex ----
    const canvas = document.getElementById('c');
    const wrap   = canvas.parentElement;

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x060e0d, 1);

    const scene  = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 200);
    camera.position.set(0, 3.5, 11);
    camera.lookAt(0, 0, 0);

    window.addEventListener('resize', () => {
      renderer.setSize(window.innerWidth, window.innerHeight);
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
    });

    const C_PRIMARY = new THREE.Color(0x5a9e9a);
    const C_LIGHT   = new THREE.Color(0x8ecac6);
    const C_CORE    = new THREE.Color(0xc8e8e6);

    // ---- Vortex spiral particles ----
    const COUNT = 1800, ARMS = 3;
    const angles    = new Float32Array(COUNT);
    const radii     = new Float32Array(COUNT);
    const heights   = new Float32Array(COUNT);
    const speeds    = new Float32Array(COUNT);
    const opacities = new Float32Array(COUNT);

    for (let i = 0; i < COUNT; i++) {
      const arm = i % ARMS, tt = Math.random();
      const r   = 0.15 + tt * 3.8;
      const armOffset = (arm / ARMS) * Math.PI * 2;
      angles[i]    = armOffset + tt * Math.PI * 4 + Math.random() * 0.5;
      radii[i]     = r;
      heights[i]   = (Math.random() - 0.5) * 3.5 * tt + Math.random() * 0.3;
      speeds[i]    = (0.08 + Math.random() * 0.07) * (1 / (r + 0.5));
      opacities[i] = 0.3 + Math.random() * 0.7;
    }

    const positions = new Float32Array(COUNT * 3);
    const colors    = new Float32Array(COUNT * 3);
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geo.setAttribute('color',    new THREE.BufferAttribute(colors,    3));
    scene.add(new THREE.Points(geo, new THREE.PointsMaterial({
      size: 0.055, vertexColors: true, transparent: true, opacity: 1.0,
      blending: THREE.AdditiveBlending, depthWrite: false, sizeAttenuation: true
    })));

    // ---- Glowing nodes ----
    const GLOW_COUNT = 120;
    const glowGeo    = new THREE.BufferGeometry();
    const glowPos    = new Float32Array(GLOW_COUNT * 3);
    const glowColors = new Float32Array(GLOW_COUNT * 3);
    const glowAngles = new Float32Array(GLOW_COUNT);
    const glowRadii  = new Float32Array(GLOW_COUNT);
    const glowH      = new Float32Array(GLOW_COUNT);
    const glowSpd    = new Float32Array(GLOW_COUNT);
    const glowPhase  = new Float32Array(GLOW_COUNT);

    for (let i = 0; i < GLOW_COUNT; i++) {
      const arm = i % ARMS, tt = Math.random(), r = 0.3 + tt * 3.2;
      const armOffset = (arm / ARMS) * Math.PI * 2;
      glowAngles[i] = armOffset + tt * Math.PI * 4 + Math.random() * 0.4;
      glowRadii[i]  = r;
      glowH[i]      = (Math.random() - 0.5) * 3.0 * tt;
      glowSpd[i]    = (0.06 + Math.random() * 0.06) * (1 / (r + 0.5));
      glowPhase[i]  = Math.random() * Math.PI * 2;
    }
    glowGeo.setAttribute('position', new THREE.BufferAttribute(glowPos,    3));
    glowGeo.setAttribute('color',    new THREE.BufferAttribute(glowColors, 3));
    const glowMat = new THREE.PointsMaterial({
      size: 0.20, vertexColors: true, transparent: true, opacity: 0.7,
      blending: THREE.AdditiveBlending, depthWrite: false, sizeAttenuation: true
    });
    scene.add(new THREE.Points(glowGeo, glowMat));

    // ---- Core glow sprites ----
    function makeCoreTexture(inner, mid, size) {
      const cv = document.createElement('canvas');
      cv.width = size; cv.height = size;
      const cx = cv.getContext('2d'), h = size / 2;
      const g  = cx.createRadialGradient(h,h,0,h,h,h);
      g.addColorStop(0,    inner);
      g.addColorStop(0.10, mid);
      g.addColorStop(0.30, 'rgba(90,158,154,0.18)');
      g.addColorStop(0.60, 'rgba(60,110,108,0.06)');
      g.addColorStop(1,    'rgba(0,0,0,0)');
      cx.fillStyle = g; cx.fillRect(0,0,size,size);
      return new THREE.CanvasTexture(cv);
    }

    const core = new THREE.Sprite(new THREE.SpriteMaterial({
      map: makeCoreTexture('rgba(200,232,230,0.85)','rgba(142,202,198,0.55)',256),
      transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
    }));
    core.scale.set(2.6, 2.6, 1);
    scene.add(core);

    const innerCore = new THREE.Sprite(new THREE.SpriteMaterial({
      map: makeCoreTexture('rgba(220,242,240,0.95)','rgba(160,215,210,0.7)',128),
      transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
    }));
    innerCore.scale.set(0.65, 0.65, 1);
    scene.add(innerCore);

    // ---- Background particles ----
    const BG_COUNT = 220;
    const bgGeo    = new THREE.BufferGeometry();
    const bgPos    = new Float32Array(BG_COUNT * 3);
    const bgColors = new Float32Array(BG_COUNT * 3);
    for (let i = 0; i < BG_COUNT; i++) {
      bgPos[i*3]   = (Math.random() - 0.5) * 24;
      bgPos[i*3+1] = (Math.random() - 0.5) * 14;
      bgPos[i*3+2] = (Math.random() - 0.5) * 6 - 3;
      const warm   = Math.random();
      bgColors[i*3]   = 0.35 + warm * 0.1;
      bgColors[i*3+1] = 0.62 + warm * 0.08;
      bgColors[i*3+2] = 0.60 - warm * 0.05;
    }
    bgGeo.setAttribute('position', new THREE.BufferAttribute(bgPos,    3));
    bgGeo.setAttribute('color',    new THREE.BufferAttribute(bgColors, 3));
    const bgMat = new THREE.PointsMaterial({
      size: 0.04, vertexColors: true, transparent: true, opacity: 0.45,
      blending: THREE.AdditiveBlending, depthWrite: false
    });
    scene.add(new THREE.Points(bgGeo, bgMat));

    // ---- Animate ----
    let t = 0;
    function animate() {
      requestAnimationFrame(animate);
      t += 0.005;

      const posArr  = geo.attributes.position.array;
      const colArr  = geo.attributes.color.array;
      const gPosArr = glowGeo.attributes.position.array;
      const gColArr = glowGeo.attributes.color.array;

      for (let i = 0; i < COUNT; i++) {
        angles[i]  += speeds[i] * 0.6;
        heights[i] += 0.002 * (0.5 + radii[i] * 0.2);
        if (heights[i] > 2.2) heights[i] = -2.2 + Math.random() * 0.4;
        const a = angles[i], r = radii[i];
        posArr[i*3]   = Math.cos(a) * r;
        posArr[i*3+1] = heights[i];
        posArr[i*3+2] = Math.sin(a) * r;
        const inner = Math.max(0, 1 - r / 4.2);
        const op    = opacities[i] * (0.35 + inner * 0.65);
        colArr[i*3]   = (C_PRIMARY.r + inner*(C_CORE.r-C_PRIMARY.r)) * op;
        colArr[i*3+1] = (C_PRIMARY.g + inner*(C_CORE.g-C_PRIMARY.g)) * op;
        colArr[i*3+2] = (C_PRIMARY.b + inner*(C_CORE.b-C_PRIMARY.b)) * op;
      }

      for (let i = 0; i < GLOW_COUNT; i++) {
        glowAngles[i] += glowSpd[i] * 0.5;
        glowH[i]      += 0.0015 * (0.5 + glowRadii[i] * 0.15);
        if (glowH[i] > 2.0) glowH[i] = -2.0;
        const a = glowAngles[i], r = glowRadii[i];
        gPosArr[i*3]   = Math.cos(a) * r;
        gPosArr[i*3+1] = glowH[i];
        gPosArr[i*3+2] = Math.sin(a) * r;
        const pulse = 0.5 + Math.sin(t * 1.6 + glowPhase[i]) * 0.5;
        const inner = Math.max(0, 1 - r / 3.5);
        gColArr[i*3]   = (C_PRIMARY.r + inner*(C_LIGHT.r-C_PRIMARY.r)) * pulse;
        gColArr[i*3+1] = (C_PRIMARY.g + inner*(C_LIGHT.g-C_PRIMARY.g)) * pulse;
        gColArr[i*3+2] = (C_PRIMARY.b + inner*(C_LIGHT.b-C_PRIMARY.b)) * pulse;
      }

      geo.attributes.position.needsUpdate     = true;
      geo.attributes.color.needsUpdate        = true;
      glowGeo.attributes.position.needsUpdate = true;
      glowGeo.attributes.color.needsUpdate    = true;

      const pulse = 0.88 + Math.sin(t * 1.4) * 0.12;
      core.scale.set(2.6 * pulse, 2.6 * pulse, 1);
      innerCore.material.opacity = 0.72 + Math.sin(t * 2.1) * 0.2;
      bgMat.opacity = 0.38 + Math.sin(t * 0.7) * 0.08;

      camera.position.x = Math.sin(t * 0.18) * 0.5;
      camera.position.y = 3.5 + Math.sin(t * 0.12) * 0.25;
      camera.lookAt(0, 0, 0);

      renderer.render(scene, camera);
    }
    animate();
  </script>


</body></html>
